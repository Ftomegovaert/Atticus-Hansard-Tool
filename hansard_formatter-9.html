<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atticus Partners Hansard Browser Tool</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.6; background: #f5f5f3; color: #1a1a1a; padding: 2rem 1rem; }
  .container { max-width: 780px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 0.25rem; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
  .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
  .card-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #888; margin-bottom: 0.75rem; }
  label { font-size: 12px; color: #555; display: block; margin-bottom: 4px; }
  input[type=date], textarea { width: 100%; font-size: 13px; font-family: inherit; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; color: #1a1a1a; outline: none; }
  input[type=date]:focus, textarea:focus { border-color: #555; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
  .btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-family: inherit; padding: 7px 14px; border: 1px solid #ccc; border-radius: 6px; background: #fff; color: #1a1a1a; cursor: pointer; transition: background 0.12s; }
  .btn:hover { background: #f0f0f0; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { width: 100%; justify-content: center; padding: 10px; font-size: 14px; font-weight: 500; background: #1a1a1a; color: #fff; border-color: #1a1a1a; margin-top: 0.75rem; }
  .btn-primary:hover { background: #333; }
  .btn-primary:disabled { background: #999; border-color: #999; }
  .presets { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 0.75rem; }
  .status { font-size: 13px; color: #666; padding: 0.5rem 0; min-height: 28px; }
  .status.error { color: #c0392b; }
  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
  .badge-debate { background: #e8f0fb; color: #1a4a8a; }
  .badge-answered { background: #e6f4ea; color: #1e6e3a; }
  .badge-unanswered { background: #fef3e2; color: #8a5a00; }
  .result-item { display: flex; gap: 10px; align-items: flex-start; padding: 0.75rem 0; border-top: 1px solid #f0f0f0; }
  .result-item:first-child { border-top: none; }
  .result-meta { font-size: 12px; color: #888; margin-top: 3px; }
  .result-preview { font-size: 12px; color: #666; margin-top: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .result-actions { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
  .topic-heading { font-size: 15px; font-weight: 600; color: #1a1a1a; margin: 1.5rem 0 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid #eee; }
  .topic-heading:first-child { margin-top: 0; }
  .section-sublabel { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #888; margin: 1rem 0 0.25rem; }
  .formatted-block { font-size: 13px; line-height: 1.8; background: #f8f8f6; border-radius: 6px; padding: 1rem; white-space: pre-wrap; word-break: break-word; }
  .formatted-block a { color: #1a5fb5; }
  .copy-row { display: flex; gap: 6px; justify-content: flex-end; margin-bottom: 0.75rem; }
  .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid #ddd; border-top-color: #666; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: -2px; margin-right: 5px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .debug-box { font-size: 11px; font-family: monospace; background: #f0f0f0; border-radius: 4px; padding: 0.5rem; margin-top: 0.5rem; max-height: 120px; overflow-y: auto; color: #444; display: none; }
  #resultsSection, #formatSection { display: none; }
</style>
</head>
<body>
<div class="container">

  <h1>Atticus Partners Hansard Browser Tool</h1>
  <p class="subtitle">Searches Hansard and Hansard Written Questions and formats hits.</p>

  <div class="card">
    <div class="card-label">Step 1 — search</div>
    <div class="grid-2">
      <div><label>Start date</label><input type="date" id="startDate" /></div>
      <div><label>End date</label><input type="date" id="endDate" /></div>
    </div>
    <div style="margin-bottom:0.75rem;">
      <label>Keywords (one per line)</label>
      <textarea id="keywords" rows="7" placeholder="broadband&#10;5G&#10;Open RAN"></textarea>
    </div>
    <div class="presets">
      <button class="btn" onclick="loadPreset('telecoms')">Telecoms</button>
      <button class="btn" onclick="loadPreset('socialmedia')">Social Media</button>
      <button class="btn" onclick="loadPreset('consumergoods')">Consumer Goods</button>
      <button class="btn" onclick="setLastWeek()">Last 7 days</button>
      <button class="btn" onclick="setLastMonth()">Last 30 days</button>
    </div>
    <button class="btn btn-primary" onclick="runSearch()" id="searchBtn">🔍 Search Parliament</button>
    <div class="status" id="searchStatus"></div>
    <div class="debug-box" id="debugBox"></div>
  </div>

  <div class="card" id="resultsSection">
    <div class="card-label">Step 2 — review hits</div>
    <div class="result-actions">
      <span id="resultCount" style="font-size:13px;color:#666;"></span>
      <div style="display:flex;gap:6px;">
        <button class="btn" onclick="selectAll(true)">Select all</button>
        <button class="btn" onclick="selectAll(false)">Clear</button>
      </div>
    </div>
    <div id="resultsList"></div>
    <button class="btn btn-primary" onclick="formatSelected()">✨ Format selected</button>
  </div>

  <div class="card" id="formatSection">
    <div class="card-label">Step 3 — formatted briefing</div>
    <div class="copy-row">
      <button class="btn" onclick="copyMarkdown()" id="copyMdBtn">📋 Copy markdown</button>
      <button class="btn" onclick="copyPlain()" id="copyPlainBtn">📋 Copy plain text</button>
    </div>
    <div class="status" id="formatStatus"></div>
    <div id="formattedOutput"></div>
  </div>

</div>
<script>
const PRESETS = {
  telecoms: [
    '5G','6G','broadband','fibre rollout','gigabit','spectrum',
    'mobile networks','Open RAN','digital infrastructure','network resilience',
    'telecoms regulation','small cells','private networks','edge computing',
    'STEM skills','digital skills'
  ].join('\n'),
  socialmedia: [
    'online safety','social media','Online Safety Act','Ofcom',
    'age verification','harmful content','disinformation','deepfake',
    'online fraud','digital markets','platform regulation','content moderation',
    'children online','online anonymity'
  ].join('\n'),
  consumergoods: [
    'consumer protection','product safety','supply chain','advertising standards',
    'packaging regulation','sustainability','carbon footprint','single use plastic',
    'trading standards','competition policy','import duties','retail regulation'
  ].join('\n')
};

let allResults = [];
let formattedGroups = {};

function loadPreset(name) { document.getElementById('keywords').value = PRESETS[name] || ''; }

function setLastWeek() {
  const end = new Date(), start = new Date();
  start.setDate(end.getDate() - 7);
  document.getElementById('endDate').value = end.toISOString().split('T')[0];
  document.getElementById('startDate').value = start.toISOString().split('T')[0];
}

function setLastMonth() {
  const end = new Date(), start = new Date();
  start.setDate(end.getDate() - 30);
  document.getElementById('endDate').value = end.toISOString().split('T')[0];
  document.getElementById('startDate').value = start.toISOString().split('T')[0];
}

function setSearchStatus(msg, spinning, isError) {
  const el = document.getElementById('searchStatus');
  el.className = 'status' + (isError ? ' error' : '');
  el.innerHTML = spinning ? `<span class="spinner"></span>${msg}` : msg;
}

function debug(msg) {
  const box = document.getElementById('debugBox');
  box.style.display = 'block';
  box.textContent += msg + '\n';
}

// Strip HTML tags and decode entities from API text fields
function stripHtml(str) {
  if (!str) return '';
  return str
    .replace(/<[^>]+>/g, ' ')  // remove tags
    .replace(/&amp;/g, '&')
    .replace(/&lt;/g, '<')
    .replace(/&gt;/g, '>')
    .replace(/&nbsp;/g, ' ')
    .replace(/&quot;/g, '"')
    .replace(/&#39;/g, "'")
    .replace(/\s{2,}/g, ' ')   // collapse whitespace
    .trim();
}

// Extract MP name robustly from various possible field shapes
function extractName(member) {
  if (!member) return '';
  return member.name || member.Name || member.displayName || member.DisplayName || '';
}

function extractParty(member) {
  if (!member) return '';
  return member.party || member.Party || member.partyName || member.PartyName || '';
}

function extractConstituency(member) {
  if (!member) return '';
  return member.memberFrom || member.MemberFrom || member.constituency || member.Constituency || '';
}

async function fetchFullQuestion(id) {
  // Fetch the individual question by internal id to get full untruncated text
  try {
    const res = await fetch(`https://questions-statements-api.parliament.uk/api/writtenquestions/questions/${id}`);
    if (!res.ok) return null;
    const data = await res.json();
    return data.value || null;
  } catch(e) { return null; }
}

async function searchWrittenQuestions(keyword, startDate, endDate) {
  // Run two searches in parallel: one by tabled date, one by answered date
  // This ensures questions asked before the window but answered within it are included
  const paramsTabled = new URLSearchParams({
    searchTerm: keyword,
    tabledWhenFrom: startDate,
    tabledWhenTo: endDate,
    take: 20, skip: 0, expandMember: true
  });
  const paramsAnswered = new URLSearchParams({
    searchTerm: keyword,
    answeredWhenFrom: startDate,
    answeredWhenTo: endDate,
    take: 20, skip: 0, expandMember: true
  });

  const [resTabled, resAnswered] = await Promise.all([
    fetch(`https://questions-statements-api.parliament.uk/api/writtenquestions/questions?${paramsTabled}`),
    fetch(`https://questions-statements-api.parliament.uk/api/writtenquestions/questions?${paramsAnswered}`)
  ]);

  const [dataTabled, dataAnswered] = await Promise.all([
    resTabled.ok ? resTabled.json() : { results: [] },
    resAnswered.ok ? resAnswered.json() : { results: [] }
  ]);

  // Merge and deduplicate by internal id
  const seenIds = new Set();
  const combined = [];
  for (const r of [...(dataTabled.results || []), ...(dataAnswered.results || [])]) {
    const v = r.value || r;
    const rid = v.id || v.Id || '';
    if (rid && seenIds.has(rid)) continue;
    if (rid) seenIds.add(rid);
    combined.push(v);
  }

  if (combined.length === 0) {
    debug(`WQ "${keyword}": 0 results`);
    return [];
  }

  // Return lightweight result objects — full text is fetched at format time only
  return combined.map(v => {
    const asking = v.askingMember || v.AskingMember || {};
    const answered = !!(v.dateAnswered || v.DateAnswered || v.isWithdrawn);
    const dateTabled = (v.dateTabled || v.DateTabled || '').split('T')[0];
    const dateForAnswer = (v.dateForAnswer || v.DateForAnswer || '').split('T')[0];
    const uin = v.uin || v.Uin || '';
    const internalId = v.id || v.Id || '';
    return {
      type: answered ? 'Answered' : 'Unanswered',
      source: 'written_question',
      keyword,
      id: uin,
      internalId,
      questionText: stripHtml(v.questionText || v.QuestionText || ''),
      answerText: '',
      askerName: extractName(asking),
      askerParty: extractParty(asking),
      askerConstituency: extractConstituency(asking),
      answererName: '',
      answererTitle: '',
      dateTabled,
      dateForAnswer,
      url: uin && dateTabled
        ? `https://questions-statements.parliament.uk/written-questions/detail/${dateTabled}/${uin}`
        : ''
    };
  });
}

async function searchHansard(keyword, startDate, endDate) {
  const params = new URLSearchParams({ searchTerm: keyword, startDate, endDate, take: 10, skip: 0 });
  try {
    const res = await fetch(`https://hansard-api.parliament.uk/search/contributions.json?${params}`);
    if (!res.ok) throw new Error(`Hansard API ${res.status}`);
    const data = await res.json();
    const seen = new Set();
    return (data.Results || []).map(r => {
      const mc = r.MemberContribution || {};
      const date = (r.SittingDate || '').split('T')[0];
      const house = (r.House || '').toLowerCase().replace(/\s/g, '');
      const debateId = mc.DebateSectionExtId || r.DebateSectionExtId || '';
      const contribId = mc.ContributionId || '';
      let url;
      if (contribId) {
        url = `https://hansard.parliament.uk/Contribution/${contribId}`;
      } else if (debateId && date && house) {
        url = `https://hansard.parliament.uk/${house}/${date}/debates/${debateId}`;
      } else {
        url = `https://hansard.parliament.uk/search/contributions?searchTerm=${encodeURIComponent(keyword)}&startDate=${startDate}&endDate=${endDate}`;
      }
      if (seen.has(url)) return null;
      seen.add(url);
      return {
        type: 'Debate', source: 'hansard', keyword,
        title: r.DebateSection || r.Overview || 'Hansard debate',
        speaker: r.AttributedTo || '',
        date, house: r.House || '', url
      };
    }).filter(Boolean);
  } catch(e) {
    setSearchStatus('⚠️ Hansard debate results could not be loaded — the Hansard API may be blocked on your network. Written questions are unaffected.', false, true);
    return [];
  }
}

async function runSearch() {
  const keywordsRaw = document.getElementById('keywords').value.trim();
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;
  if (!keywordsRaw || !startDate || !endDate) {
    setSearchStatus('Please enter keywords and a date range.', false, false);
    return;
  }

  const keywords = keywordsRaw.split('\n').map(k => k.trim()).filter(Boolean);
  document.getElementById('searchBtn').disabled = true;
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('formatSection').style.display = 'none';
  document.getElementById('debugBox').style.display = 'none';
  document.getElementById('debugBox').textContent = '';
  allResults = [];
  const seen = new Set();

  const BATCH_SIZE = 3;
  let searched = 0;
  for (let i = 0; i < keywords.length; i += BATCH_SIZE) {
    const batch = keywords.slice(i, i + BATCH_SIZE);
    setSearchStatus(`Searching ${Math.min(i + BATCH_SIZE, keywords.length)}/${keywords.length} keywords...`, true, false);
    const batchResults = await Promise.all(
      batch.map(kw => Promise.all([
        searchWrittenQuestions(kw, startDate, endDate).catch(e => { debug('WQ error: ' + e.message); return []; }),
        searchHansard(kw, startDate, endDate).catch(() => [])
      ]))
    );
    for (const [wqs, hansard] of batchResults) {
      [...wqs, ...hansard].forEach(r => {
        const key = r.url + (r.questionText || r.title || '').substring(0, 60);
        if (!seen.has(key)) { seen.add(key); allResults.push(r); }
      });
    }
    searched += batch.length;
  }

  allResults.sort((a, b) => (b.dateTabled || b.date || '').localeCompare(a.dateTabled || a.date || ''));
  document.getElementById('searchBtn').disabled = false;
  setSearchStatus('', false, false);
  renderResults();
}

function renderResults() {
  const section = document.getElementById('resultsSection');
  const list = document.getElementById('resultsList');
  document.getElementById('resultCount').textContent = `${allResults.length} result${allResults.length !== 1 ? 's' : ''} found`;

  if (allResults.length === 0) {
    list.innerHTML = `<p style="font-size:13px;color:#888;padding:0.5rem 0;">No results. Try a broader date range or different keywords. Check the debug info above if searches completed but returned nothing.</p>`;
    section.style.display = 'block';
    return;
  }

  list.innerHTML = allResults.map((r, i) => {
    const badgeClass = r.source === 'hansard' ? 'badge-debate' : r.type === 'Answered' ? 'badge-answered' : 'badge-unanswered';
    const name = r.source === 'written_question'
      ? (r.askerName || 'Unknown MP') + (r.askerParty ? ` · ${r.askerParty}` : '')
      : r.title;
    const meta = r.source === 'written_question'
      ? [r.dateTabled, r.askerConstituency, r.keyword].filter(Boolean).join(' · ')
      : [r.date, r.house, r.speaker, r.keyword].filter(Boolean).join(' · ');
    return `<div class="result-item">
      <input type="checkbox" id="chk${i}" data-idx="${i}" checked style="margin-top:3px;flex-shrink:0;" />
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:2px;">
          <span class="badge ${badgeClass}">${r.source === 'hansard' ? 'Debate' : r.type}</span>
          <strong style="font-size:13px;">${name}</strong>
        </div>
        <div class="result-meta">${meta}</div>
        ${r.questionText ? `<div class="result-preview" style="display:block; -webkit-line-clamp:unset; overflow:visible;">${r.questionText}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  section.style.display = 'block';
}

function selectAll(checked) {
  document.querySelectorAll('#resultsList input[type=checkbox]').forEach(cb => cb.checked = checked);
}

function getSelected() {
  return Array.from(document.querySelectorAll('#resultsList input[type=checkbox]:checked'))
    .map(cb => allResults[parseInt(cb.dataset.idx)]);
}

// Build formatted output for one written question result (called after full text fetched)
function formatWQ(r) {
  const asker = r.askerName ? `${r.askerName} MP` : 'Unknown MP';
  const details = [r.askerParty, r.askerConstituency].filter(Boolean).join(', ');
  const askerStr = details ? `${asker} (${details})` : asker;

  // Change 5: Validate URL — flag rather than construct broken link
  const linkPart = r.url
    ? `[submitted](${r.url})`
    : `submitted [Link may be invalid — UIN or date missing]`;

  let out = `• ${askerStr} ${linkPart} a written question asking: "${r.questionText}"\n`;

  if (r.type === 'Answered') {
    const answerer = r.answererName || 'Minister';
    const title = r.answererTitle ? ` (${r.answererTitle})` : '';
    // Change 5: Flag missing answer text explicitly
    const answerText = r.answerText
      ? r.answerText
      : '[Answer text not retrieved — view full record via link]';
    // Change 5: Flag if full text fetch failed
    const textWarning = r.fullTextFailed
      ? ' [Full text unavailable — truncated version shown]'
      : '';
    out += `• ${answerer}${title} replied: "${answerText}"${textWarning}`;
  } else {
    out += `• This question is due for answer by ${r.dateForAnswer || 'date unknown'}`;
  }
  return out;
}

async function formatSelected() {
  const selected = getSelected();
  if (!selected.length) { alert('Select at least one result.'); return; }

  document.getElementById('formatSection').style.display = 'block';
  document.getElementById('formattedOutput').innerHTML = '';
  const formatStatus = document.getElementById('formatStatus');
  formatStatus.textContent = '';

  // Change 2: Fetch full text for selected written questions in parallel at format time
  const wqSelected = selected.filter(r => r.source === 'written_question');
  formatStatus.innerHTML = `<span class="spinner"></span>Fetching full text for ${wqSelected.length} written question${wqSelected.length !== 1 ? 's' : ''}...`;

  const enriched = await Promise.all(
    selected.map(async r => {
      if (r.source !== 'written_question') return r;
      if (!r.internalId) return { ...r, fullTextFailed: true };
      const full = await fetchFullQuestion(r.internalId);
      if (!full) return { ...r, fullTextFailed: true };
      const asking = full.askingMember || full.AskingMember || r.askerName ? (full.askingMember || full.AskingMember || {}) : {};
      const answerObj = full.answer || full.Answer || {};
      const answering = full.answeringMember || full.AnsweringMember || {};
      const answeringFull = answering.name ? answering
        : answerObj.answeringMember || answerObj.AnsweringMember || answering;
      // Change 5: Validate UIN and dateTabled before constructing URL
      const uin = full.uin || full.Uin || r.id || '';
      const dateTabled = (full.dateTabled || full.DateTabled || r.dateTabled || '').split('T')[0];
      const url = (uin && dateTabled)
        ? `https://questions-statements.parliament.uk/written-questions/detail/${dateTabled}/${uin}`
        : '';
      return {
        ...r,
        url,
        questionText: stripHtml(full.questionText || full.QuestionText || r.questionText || ''),
        answerText: stripHtml(answerObj.answerText || answerObj.AnswerText || full.answerText || full.AnswerText || ''),
        askerName: extractName(asking) || r.askerName,
        askerParty: extractParty(asking) || r.askerParty,
        askerConstituency: extractConstituency(asking) || r.askerConstituency,
        answererName: extractName(answeringFull),
        answererTitle: full.answeringBodyName || full.AnsweringBodyName || answerObj.answeringBodyName || '',
        fullTextFailed: false
      };
    })
  );

  const grouped = {};
  enriched.forEach(r => {
    const k = r.keyword;
    if (!grouped[k]) grouped[k] = { wqs: [], debates: [] };
    if (r.source === 'written_question') grouped[k].wqs.push(r);
    else grouped[k].debates.push(r);
  });

  formattedGroups = {};
  const outputEl = document.getElementById('formattedOutput');

  for (const [keyword, { wqs, debates }] of Object.entries(grouped)) {
    let wqFormatted = wqs.map(formatWQ).join('\n\n');

    let debateLinks = '';
    if (debates.length) {
      const seen = new Set();
      debateLinks = debates
        .filter(d => { const k = d.url + d.title; if (seen.has(k)) return false; seen.add(k); return true; })
        .map(d => `• [${d.title}](${d.url})${d.speaker ? ' — ' + d.speaker : ''}${d.date ? ' (' + d.date + ')' : ''}`)
        .join('\n');
    }

    formattedGroups[keyword] = { wqFormatted, debateLinks };

    const topicDiv = document.createElement('div');
    let inner = `<div class="topic-heading">${keyword}</div>`;
    if (wqFormatted) {
      inner += `<div class="section-sublabel">Written questions</div>`;
      inner += `<div class="formatted-block">${renderMarkdownLinks(escapeHtml(wqFormatted))}</div>`;
    }
    if (debateLinks) {
      inner += `<div class="section-sublabel" style="margin-top:${wqFormatted ? '1rem' : '0'};">Debate links</div>`;
      inner += `<div class="formatted-block">${renderMarkdownLinks(escapeHtml(debateLinks))}</div>`;
    }
    topicDiv.innerHTML = inner;
    outputEl.appendChild(topicDiv);
  }

  formatStatus.textContent = '✓ Done';
}

function escapeHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMarkdownLinks(str) {
  return str.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
}

function getFullMarkdown() {
  return Object.entries(formattedGroups).map(([k, { wqFormatted, debateLinks }]) => {
    let out = `## ${k}\n\n`;
    if (wqFormatted) out += `### Written questions\n\n${wqFormatted}\n\n`;
    if (debateLinks) out += `### Debate links\n\n${debateLinks}\n\n`;
    return out.trim();
  }).join('\n\n---\n\n');
}

function getFullPlain() {
  return Object.entries(formattedGroups).map(([k, { wqFormatted, debateLinks }]) => {
    let out = `${k.toUpperCase()}\n\n`;
    if (wqFormatted) out += `Written questions\n\n${wqFormatted.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')}\n\n`;
    if (debateLinks) out += `Debate links\n\n${debateLinks.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')}\n\n`;
    return out.trim();
  }).join('\n\n---\n\n');
}

function copyMarkdown() {
  navigator.clipboard.writeText(getFullMarkdown()).then(() => {
    const btn = document.getElementById('copyMdBtn');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

function copyPlain() {
  navigator.clipboard.writeText(getFullPlain()).then(() => {
    const btn = document.getElementById('copyPlainBtn');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

setLastWeek();
</script>
